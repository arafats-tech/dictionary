<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urdu Dictionary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+Bengali:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f6f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #1a1a1a;
      color: #f7f6f3;
      padding: 28px 24px 22px;
      text-align: center;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.3px; }
    header p {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 12px; color: #777; margin-top: 4px;
    }

    /* PAGE LAYOUT */
    .page {
      max-width: 1060px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      display: grid;
      grid-template-columns: 180px 1fr;
      grid-template-areas:
        "sidebar toolbar"
        "sidebar meta"
        "sidebar table";
      gap: 0 24px;
      align-items: start;
    }

    /* SIDEBAR */
    .sidebar {
      grid-area: sidebar;
    }
    .sidebar-inner {
      position: sticky;
      top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-box {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .s-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 4px;
    }
    .s-value {
      font-size: 30px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1;
    }
    .s-sub {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
      font-family: 'Noto Serif Bengali', serif;
    }

    .lang-box {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .lang-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .lang-row:last-child { border-bottom: none; }
    .lang-name { color: #666; }
    .lang-script { color: #aaa; font-size: 11px; }

    .chips-box {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .chip {
      font-size: 11px;
      padding: 3px 9px;
      background: #f0eeeb;
      border-radius: 999px;
      color: #555;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: background .15s, color .15s;
    }
    .chip:hover { background: #1a1a1a; color: #fff; }

    /* TOOLBAR */
    .toolbar {
      grid-area: toolbar;
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%); color: #aaa; pointer-events: none;
    }
    input[type="search"] {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      outline: none;
    }
    input[type="search"]:focus { border-color: #1a1a1a; }
    input[type="search"]::placeholder { color: #bbb; }
    input[type="search"]::-webkit-search-cancel-button { display: none; }
    select {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #444;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #1a1a1a; }

    /* META */
    .meta {
      grid-area: meta;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }

    /* TABLE */
    .table-wrap { grid-area: table; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      font-size: 13.5px;
    }
    thead tr { background: #f0eeeb; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #999;
      border-bottom: 1px solid #e8e8e8;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf9f7; }
    .num { color: #ccc; font-size: 12px; width: 30px; }
    .urdu-word { font-weight: 600; color: #1a1a1a; }
    .english { color: #333; }
    .bangla { font-family: 'Noto Serif Bengali', serif; color: #666; font-size: 13px; }

    mark {
      background: #ffe58a; color: inherit;
      border-radius: 2px; padding: 0 1px;
    }

    .empty {
      text-align: center; padding: 48px 20px;
      color: #bbb; font-size: 14px;
    }

    footer {
      text-align: center; padding: 20px;
      font-size: 11px; color: #ccc;
      border-top: 1px solid #eee;
    }

    /* MOBILE */
    @media (max-width: 640px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-areas:
          "toolbar"
          "meta"
          "table"
          "sidebar";
        padding: 14px 12px 48px;
        gap: 0;
      }
      .sidebar { margin-top: 20px; }
      .sidebar-inner { position: static; flex-direction: row; flex-wrap: wrap; }
      .stat-box, .lang-box, .chips-box { flex: 1 1 140px; }
      .toolbar { margin-bottom: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Urdu Dictionary</h1>
  <p>উর্দু শব্দ — ইংরেজি ও বাংলায়</p>
</header>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="stat-box">
        <div class="s-label">মোট শব্দ</div>
        <div class="s-value" id="total-count">18</div>
        <div class="s-sub">সংরক্ষিত</div>
      </div>

      <div class="lang-box">
        <div class="s-label">ভাষা</div>
        <div class="lang-row">
          <span class="lang-name">Urdu</span>
          <span class="lang-script">Roman</span>
        </div>
        <div class="lang-row">
          <span class="lang-name">English</span>
          <span class="lang-script">Latin</span>
        </div>
        <div class="lang-row">
          <span class="lang-name">বাংলা</span>
          <span class="lang-script">বর্ণ</span>
        </div>
      </div>

      <div class="chips-box">
        <div class="s-label">Quick Pick</div>
        <div class="chips" id="chips"></div>
      </div>

    </div>
  </aside>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="শব্দ খুঁজুন…" autocomplete="off" />
    </div>
    <select id="sort">
      <option value="default">Default</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>

  <!-- META -->
  <div class="meta" id="meta"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Urdu Word</th>
          <th>English</th>
          <th>বাংলা</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<footer>Urdu Dictionary &mdash; উর্দু লুঘাত</footer>

<script>
  const words = [
    { id:1,  urdu:"Musawir",       en:"Artist",                     bn:"শিল্পী" },
    { id:2,  urdu:"Taabeer",       en:"Reflection / Interpretation", bn:"প্রতিফলন / ব্যাখ্যা" },
    { id:3,  urdu:"Nukht-e-Nazar", en:"Perspective",                bn:"দৃষ্টিভঙ্গি" },
    { id:4,  urdu:"Shiddat",       en:"Passion / Intensity",        bn:"গভীর আবেগ / তীব্রতা" },
    { id:5,  urdu:"Nigaahon",      en:"Eyes / Gaze",                bn:"চোখ / দৃষ্টি" },
    { id:6,  urdu:"Karam",         en:"Kindness / Grace",           bn:"দয়া / অনুগ্রহ" },
    { id:7,  urdu:"Ahista",        en:"Slowly",                     bn:"ধীরে ধীরে" },
    { id:8,  urdu:"Ghurbat",       en:"Exile",                      bn:"নির্বাসন" },
    { id:9,  urdu:"Filhaal",       en:"At Present",                 bn:"আপাতত / বর্তমানে" },
    { id:10, urdu:"Zehnaseeb",     en:"Fortunate / Blessed",        bn:"সৌভাগ্যবান" },
    { id:11, urdu:"Betahasha",     en:"Wildly / Excessively",       bn:"অত্যধিকভাবে" },
    { id:12, urdu:"Khairiyat",     en:"Well-being",                 bn:"কুশলতা" },
    { id:13, urdu:"Dilkashi",      en:"Charm / Attraction",         bn:"আকর্ষণ" },
    { id:14, urdu:"Justajoo",      en:"Quest / Pursuit",            bn:"অনুসন্ধান" },
    { id:15, urdu:"Fitoor",        en:"Obsession",                  bn:"মোহ / আসক্তি" },
    { id:16, urdu:"Darasal",       en:"In Fact / Actually",         bn:"আসলে / প্রকৃতপক্ষে" },
    { id:17, urdu:"Khubiya",       en:"Qualities",                  bn:"গুণাবলি" },
    { id:18, urdu:"Khamiya",       en:"Shortcomings",               bn:"ত্রুটি / দুর্বলতা" },
  ];

  const tbody  = document.getElementById('tbody');
  const search = document.getElementById('search');
  const sort   = document.getElementById('sort');
  const meta   = document.getElementById('meta');
  const chips  = document.getElementById('chips');
  const totalEl= document.getElementById('total-count');

  // Build quick-pick chips
  words.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = w.urdu;
    btn.onclick = () => {
      search.value = w.urdu;
      render();
      search.focus();
    };
    chips.appendChild(btn);
  });

  function hl(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const s = sort.value;

    let list = words.filter(w =>
      !q ||
      w.urdu.toLowerCase().includes(q) ||
      w.en.toLowerCase().includes(q) ||
      w.bn.includes(q)
    );

    if (s === 'az') list.sort((a,b) => a.en.localeCompare(b.en));
    else if (s === 'za') list.sort((a,b) => b.en.localeCompare(a.en));

    totalEl.textContent = list.length;
    meta.textContent = `${list.length} টি শব্দ দেখানো হচ্ছে`;

    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty">কোনো শব্দ পাওয়া যায়নি।</div></td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(w => `
      <tr>
        <td class="num">${w.id}</td>
        <td class="urdu-word">${hl(w.urdu, q)}</td>
        <td class="english">${hl(w.en, q)}</td>
        <td class="bangla">${hl(w.bn, q)}</td>
      </tr>
    `).join('');
  }

  search.addEventListener('input', render);
  sort.addEventListener('change', render);
  render();
</script>
</body>
</html>
