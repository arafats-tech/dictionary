<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urdu Dictionary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+Bengali:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f6f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #1a1a1a;
      color: #f7f6f3;
      padding: 36px 24px 28px;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header p {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    /* SEARCH */
    .toolbar {
      max-width: 640px;
      margin: 24px auto 20px;
      padding: 0 16px;
      display: flex;
      gap: 10px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      outline: none;
    }
    input[type="search"]:focus { border-color: #1a1a1a; }
    input[type="search"]::placeholder { color: #bbb; }
    input[type="search"]::-webkit-search-cancel-button { display: none; }

    select {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #444;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #1a1a1a; }

    /* COUNTER */
    .meta {
      max-width: 640px;
      margin: 0 auto 12px;
      padding: 0 16px;
      font-size: 12px;
      color: #999;
    }

    /* TABLE */
    .table-wrap {
      max-width: 640px;
      margin: 0 auto 60px;
      padding: 0 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      font-size: 13.5px;
    }

    thead tr {
      background: #f0eeeb;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid #e8e8e8;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #faf9f7; }

    .num { color: #ccc; font-size: 12px; width: 32px; }

    .urdu-word {
      font-weight: 600;
      color: #1a1a1a;
      font-size: 14px;
    }

    .english { color: #333; }

    .bangla {
      font-family: 'Noto Serif Bengali', serif;
      color: #666;
      font-size: 13px;
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #bbb;
      font-size: 14px;
    }

    /* HIGHLIGHT */
    mark {
      background: #ffe58a;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #bbb;
      border-top: 1px solid #eee;
    }

    @media (max-width: 480px) {
      th:first-child, td.num { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Urdu Dictionary</h1>
  <p>উর্দু শব্দ — ইংরেজি ও বাংলায়</p>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="search" id="search" placeholder="শব্দ খুঁজুন…" autocomplete="off" />
  </div>
  <select id="sort">
    <option value="default">Default</option>
    <option value="az">A → Z</option>
    <option value="za">Z → A</option>
  </select>
</div>

<div class="meta" id="meta"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Urdu Word</th>
        <th>English</th>
        <th>বাংলা</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>Urdu Dictionary &mdash; উর্দু লুঘাত</footer>

<script>
  const words = [
    { id:1,  urdu:"Musawir",       en:"Artist",                     bn:"শিল্পী" },
    { id:2,  urdu:"Taabeer",       en:"Reflection / Interpretation", bn:"প্রতিফলন / ব্যাখ্যা" },
    { id:3,  urdu:"Nukht-e-Nazar", en:"Perspective",                bn:"দৃষ্টিভঙ্গি" },
    { id:4,  urdu:"Shiddat",       en:"Passion / Intensity",        bn:"গভীর আবেগ / তীব্রতা" },
    { id:5,  urdu:"Nigaahon",      en:"Eyes / Gaze",                bn:"চোখ / দৃষ্টি" },
    { id:6,  urdu:"Karam",         en:"Kindness / Grace",           bn:"দয়া / অনুগ্রহ" },
    { id:7,  urdu:"Ahista",        en:"Slowly",                     bn:"ধীরে ধীরে" },
    { id:8,  urdu:"Ghurbat",       en:"Exile",                      bn:"নির্বাসন" },
    { id:9,  urdu:"Filhaal",       en:"At Present",                 bn:"আপাতত / বর্তমানে" },
    { id:10, urdu:"Zehnaseeb",     en:"Fortunate / Blessed",        bn:"সৌভাগ্যবান" },
    { id:11, urdu:"Betahasha",     en:"Wildly / Excessively",       bn:"অত্যধিকভাবে" },
    { id:12, urdu:"Khairiyat",     en:"Well-being",                 bn:"কুশলতা" },
    { id:13, urdu:"Dilkashi",      en:"Charm / Attraction",         bn:"আকর্ষণ" },
    { id:14, urdu:"Justajoo",      en:"Quest / Pursuit",            bn:"অনুসন্ধান" },
    { id:15, urdu:"Fitoor",        en:"Obsession",                  bn:"মোহ / আসক্তি" },
    { id:16, urdu:"Darasal",       en:"In Fact / Actually",         bn:"আসলে / প্রকৃতপক্ষে" },
    { id:17, urdu:"Khubiya",       en:"Qualities",                  bn:"গুণাবলি" },
    { id:18, urdu:"Khamiya",       en:"Shortcomings",               bn:"ত্রুটি / দুর্বলতা" },
  ];

  const tbody = document.getElementById('tbody');
  const search = document.getElementById('search');
  const sort = document.getElementById('sort');
  const meta = document.getElementById('meta');

  function hl(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const s = sort.value;

    let list = words.filter(w =>
      !q ||
      w.urdu.toLowerCase().includes(q) ||
      w.en.toLowerCase().includes(q) ||
      w.bn.includes(q)
    );

    if (s === 'az') list.sort((a,b) => a.en.localeCompare(b.en));
    else if (s === 'za') list.sort((a,b) => b.en.localeCompare(a.en));

    meta.textContent = `${list.length} টি শব্দ`;

    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty">কোনো শব্দ পাওয়া যায়নি।</div></td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(w => `
      <tr>
        <td class="num">${w.id}</td>
        <td class="urdu-word">${hl(w.urdu, q)}</td>
        <td class="english">${hl(w.en, q)}</td>
        <td class="bangla">${hl(w.bn, q)}</td>
      </tr>
    `).join('');
  }

  search.addEventListener('input', render);
  sort.addEventListener('change', render);
  render();
</script>
</body>
</html>
