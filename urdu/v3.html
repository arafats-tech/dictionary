<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urdu Dictionary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+Bengali:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f2f1ee;
      --surface:   #ffffff;
      --border:    #e3e2de;
      --row-line:  #f0efec;
      --text:      #18181b;
      --text2:     #52525b;
      --text3:     #a1a1aa;
      --hover-row: #fafaf9;
      --chip-bg:   #e8e7e3;
      --chip-fg:   #52525b;
      --mark:      #fde68a;
      --nav-bg:    #18181b;
      --nav-fg:    #e4e4e7;
      --nav-sub:   #52525b;
      --toggle-bd: #3f3f46;
    }
    [data-theme="dark"] {
      --bg:        #0f0f10;
      --surface:   #18181b;
      --border:    #27272a;
      --row-line:  #1f1f22;
      --text:      #e4e4e7;
      --text2:     #a1a1aa;
      --text3:     #52525b;
      --hover-row: #1c1c1f;
      --chip-bg:   #27272a;
      --chip-fg:   #a1a1aa;
      --mark:      #78350f;
      --nav-bg:    #09090b;
      --nav-fg:    #e4e4e7;
      --nav-sub:   #52525b;
      --toggle-bd: #3f3f46;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      background: var(--nav-bg);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .nav-brand strong {
      font-size: 14px;
      font-weight: 600;
      color: var(--nav-fg);
      letter-spacing: -0.2px;
    }
    .nav-brand span {
      font-size: 11px;
      color: var(--nav-sub);
      font-family: 'Noto Serif Bengali', serif;
    }

    .theme-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--toggle-bd);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--nav-fg);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity .15s, border-color .15s;
    }
    .theme-btn:hover { opacity: 1; border-color: #71717a; }

    /* ── LAYOUT ── */
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 80px;
      display: grid;
      grid-template-columns: 156px 1fr;
      gap: 0 20px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      grid-column: 1;
      grid-row: 1 / 4;
    }
    .sidebar-inner {
      position: sticky;
      top: 68px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .panel-title {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    /* stat */
    .stat-num {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--text);
    }
    .stat-desc {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
      font-family: 'Noto Serif Bengali', serif;
    }

    /* lang list */
    .lang-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--row-line);
      font-size: 12px;
    }
    .lang-item:first-child { padding-top: 0; }
    .lang-item:last-child  { border-bottom: none; padding-bottom: 0; }
    .l-name   { color: var(--text2); }
    .l-script { font-size: 10px; color: var(--text3); }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 10px;
      padding: 2px 8px;
      background: var(--chip-bg);
      color: var(--chip-fg);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .12s, color .12s;
      line-height: 1.8;
    }
    .chip:hover, .chip.active {
      background: var(--text);
      color: var(--bg);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      grid-column: 2;
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-wrap { flex: 1; position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3); pointer-events: none;
      flex-shrink: 0;
    }
    input[type="search"] {
      width: 100%;
      padding: 8px 10px 8px 32px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="search"]:focus {
      border-color: var(--text3);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--text) 6%, transparent);
    }
    input[type="search"]::placeholder { color: var(--text3); }
    input[type="search"]::-webkit-search-cancel-button { display: none; }

    select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: var(--text2);
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }
    select:focus { border-color: var(--text3); }
    select option { background: var(--surface); color: var(--text); }

    /* ── META ── */
    .meta {
      grid-column: 2;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 8px;
    }

    /* ── TABLE ── */
    .table-wrap { grid-column: 2; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      font-size: 13px;
    }

    thead tr { background: var(--bg); }

    th {
      text-align: left;
      padding: 9px 14px;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--row-line);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--hover-row); }

    .c-num  { color: var(--text3); font-size: 11px; width: 32px; font-variant-numeric: tabular-nums; }
    .c-urdu { font-weight: 500; color: var(--text); }
    .c-en   { color: var(--text2); }
    .c-bn   { font-family: 'Noto Serif Bengali', serif; color: var(--text3); font-size: 12px; }

    mark {
      background: var(--mark);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text3);
      font-size: 13px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 14px;
      font-size: 11px;
      color: var(--text3);
    }

    /* ── MOBILE ── */
    @media (max-width: 580px) {
      nav { padding: 0 14px; }
      .page {
        grid-template-columns: 1fr;
        padding: 16px 14px 60px;
      }
      .sidebar { grid-column: 1; grid-row: auto; margin-top: 20px; }
      .sidebar-inner { position: static; flex-direction: row; flex-wrap: wrap; }
      .panel  { flex: 1 1 140px; }
      .toolbar, .meta, .table-wrap { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <strong>Urdu Dictionary</strong>
    <span>উর্দু লুঘাত</span>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">
    <svg id="t-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <span id="t-label">Light</span>
  </button>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="panel">
        <div class="panel-title">শব্দ</div>
        <div class="stat-num" id="stat-count">18</div>
        <div class="stat-desc">সংরক্ষিত</div>
      </div>

      <div class="panel">
        <div class="panel-title">ভাষা</div>
        <div class="lang-item"><span class="l-name">Urdu</span><span class="l-script">Roman</span></div>
        <div class="lang-item"><span class="l-name">English</span><span class="l-script">Latin</span></div>
        <div class="lang-item"><span class="l-name">বাংলা</span><span class="l-script">বর্ণ</span></div>
      </div>

      <div class="panel">
        <div class="panel-title">Quick</div>
        <div class="chips" id="chips"></div>
      </div>

    </div>
  </aside>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="খুঁজুন — Urdu, English বা বাংলা" autocomplete="off" />
    </div>
    <select id="sort-sel">
      <option value="">Default</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>

  <!-- META -->
  <div class="meta" id="meta"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Urdu Word</th>
          <th>English Meaning</th>
          <th>বাংলা অর্থ</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<footer>Urdu Dictionary &mdash; উর্দু লুঘাত</footer>

<script>
const WORDS = [
  { id:1,  urdu:"Musawir",       en:"Artist",                     bn:"শিল্পী" },
  { id:2,  urdu:"Taabeer",       en:"Reflection / Interpretation",bn:"প্রতিফলন / ব্যাখ্যা" },
  { id:3,  urdu:"Nukht-e-Nazar", en:"Perspective",                bn:"দৃষ্টিভঙ্গি" },
  { id:4,  urdu:"Shiddat",       en:"Passion / Intensity",        bn:"গভীর আবেগ / তীব্রতা" },
  { id:5,  urdu:"Nigaahon",      en:"Eyes / Gaze",                bn:"চোখ / দৃষ্টি" },
  { id:6,  urdu:"Karam",         en:"Kindness / Grace",           bn:"দয়া / অনুগ্রহ" },
  { id:7,  urdu:"Ahista",        en:"Slowly",                     bn:"ধীরে ধীরে" },
  { id:8,  urdu:"Ghurbat",       en:"Exile",                      bn:"নির্বাসন" },
  { id:9,  urdu:"Filhaal",       en:"At Present",                 bn:"আপাতত / বর্তমানে" },
  { id:10, urdu:"Zehnaseeb",     en:"Fortunate / Blessed",        bn:"সৌভাগ্যবান" },
  { id:11, urdu:"Betahasha",     en:"Wildly / Excessively",       bn:"অত্যধিকভাবে" },
  { id:12, urdu:"Khairiyat",     en:"Well-being",                 bn:"কুশলতা" },
  { id:13, urdu:"Dilkashi",      en:"Charm / Attraction",         bn:"আকর্ষণ" },
  { id:14, urdu:"Justajoo",      en:"Quest / Pursuit",            bn:"অনুসন্ধান" },
  { id:15, urdu:"Fitoor",        en:"Obsession",                  bn:"মোহ / আসক্তি" },
  { id:16, urdu:"Darasal",       en:"In Fact / Actually",         bn:"আসলে / প্রকৃতপক্ষে" },
  { id:17, urdu:"Khubiya",       en:"Qualities",                  bn:"গুণাবলি" },
  { id:18, urdu:"Khamiya",       en:"Shortcomings",               bn:"ত্রুটি / দুর্বলতা" },
];

/* ── THEME ── */
const root = document.documentElement;
(function () {
  const saved = localStorage.getItem('ud-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(saved);
})();

function applyTheme(t) {
  root.setAttribute('data-theme', t);
  localStorage.setItem('ud-theme', t);
  document.getElementById('t-label').textContent = t === 'dark' ? 'Dark' : 'Light';
  document.getElementById('t-icon').innerHTML = t === 'dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}
function toggleTheme() {
  applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

/* ── CHIPS ── */
let activeChip = null;
const chipsEl = document.getElementById('chips');
WORDS.forEach(w => {
  const b = document.createElement('button');
  b.className = 'chip';
  b.textContent = w.urdu;
  b.onclick = () => {
    if (activeChip === w.urdu) {
      activeChip = null;
      searchEl.value = '';
      b.classList.remove('active');
    } else {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      activeChip = w.urdu;
      searchEl.value = w.urdu;
      b.classList.add('active');
    }
    render();
  };
  chipsEl.appendChild(b);
});

/* ── RENDER ── */
const tbody   = document.getElementById('tbody');
const searchEl= document.getElementById('search');
const sortSel = document.getElementById('sort-sel');
const metaEl  = document.getElementById('meta');
const countEl = document.getElementById('stat-count');

searchEl.addEventListener('input', () => {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  activeChip = null;
  render();
});
sortSel.addEventListener('change', render);

function hl(str, q) {
  if (!q) return str;
  return str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  let list = WORDS.filter(w =>
    !q || w.urdu.toLowerCase().includes(q) || w.en.toLowerCase().includes(q) || w.bn.includes(q)
  );
  const s = sortSel.value;
  if (s === 'az') list.sort((a,b) => a.en.localeCompare(b.en));
  else if (s === 'za') list.sort((a,b) => b.en.localeCompare(a.en));

  countEl.textContent = list.length;
  metaEl.textContent  = list.length === WORDS.length
    ? `${WORDS.length} টি শব্দ`
    : `${list.length} / ${WORDS.length} টি শব্দ`;

  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty">কোনো শব্দ পাওয়া যায়নি।</div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(w => `
    <tr>
      <td class="c-num">${w.id}</td>
      <td class="c-urdu">${hl(w.urdu, q)}</td>
      <td class="c-en">${hl(w.en, q)}</td>
      <td class="c-bn">${hl(w.bn, q)}</td>
    </tr>`).join('');
}

render();
</script>
</body>
</html>
