<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urdu Dictionary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+Bengali:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f2f1ee;
      --surface:   #ffffff;
      --border:    #e3e2de;
      --text:      #18181b;
      --text2:     #52525b;
      --text3:     #a1a1aa;
      --hover:     #fafaf9;
      --chip-bg:   #e8e7e3;
      --chip-fg:   #52525b;
      --mark:      #fde68a;
      --nav-bg:    #18181b;
      --nav-fg:    #e4e4e7;
      --nav-sub:   #52525b;
      --day-bg:    #f0efec;
      --day-act:   #18181b;
      --day-act-fg:#ffffff;
    }
    [data-theme="dark"] {
      --bg:        #0f0f10;
      --surface:   #18181b;
      --border:    #27272a;
      --text:      #e4e4e7;
      --text2:     #a1a1aa;
      --text3:     #52525b;
      --hover:     #1c1c1f;
      --chip-bg:   #27272a;
      --chip-fg:   #a1a1aa;
      --mark:      #78350f;
      --nav-bg:    #09090b;
      --nav-fg:    #e4e4e7;
      --nav-sub:   #3f3f46;
      --day-bg:    #1c1c1f;
      --day-act:   #e4e4e7;
      --day-act-fg:#18181b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      background: var(--nav-bg);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .nav-brand strong { font-size: 15px; font-weight: 600; color: var(--nav-fg); }
    .nav-brand span { font-size: 12px; color: var(--nav-sub); font-family: 'Noto Serif Bengali', serif; margin-left: 8px; }
    .theme-btn {
      background: none; border: 1px solid #3f3f46; border-radius: 6px;
      padding: 6px 12px; color: var(--nav-fg); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
      min-width: 100px;
    }
    .stat-box .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 4px;
    }
    .stat-box .value {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .stat-box .sub {
      font-size: 11px;
      color: var(--text3);
      font-family: 'Noto Serif Bengali', serif;
    }

    .day-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .day-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .day-btn:hover { background: var(--hover); }
    .day-btn.active {
      background: var(--day-act);
      color: var(--day-act-fg);
      border-color: var(--day-act);
    }
    .day-btn .count {
      font-size: 10px;
      opacity: 0.6;
      margin-left: 4px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }
    input[type="search"] {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
    }
    input[type="search"]:focus { border-color: var(--text3); }
    input[type="search"]::placeholder { color: var(--text3); }
    select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text2);
      outline: none;
      cursor: pointer;
    }

    .result-count {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .word-row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 1fr 50px;
      gap: 8px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.1s;
    }
    .word-row:first-child { border-radius: 10px 10px 0 0; }
    .word-row:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
    .word-row:hover { background: var(--hover); }
    
    .word-row.header {
      background: var(--bg);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      font-weight: 600;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .word-row.header:first-child { border-radius: 10px 10px 0 0; }

    .col-id { color: var(--text3); font-size: 12px; font-variant-numeric: tabular-nums; }
    .col-word { font-weight: 600; font-size: 15px; }
    .col-en { font-size: 14px; color: var(--text); }
    .col-bn { font-family: 'Noto Serif Bengali', serif; font-size: 14px; color: var(--text2); }
    .col-day {
      font-size: 11px;
      color: var(--text3);
      background: var(--chip-bg);
      padding: 2px 8px;
      border-radius: 4px;
      text-align: center;
    }

    mark { background: var(--mark); color: inherit; border-radius: 2px; padding: 0 2px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text3);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    @media (max-width: 640px) {
      nav { padding: 10px 14px; }
      .nav-brand strong { font-size: 14px; }
      .nav-brand span { font-size: 11px; display: none; }
      .container { padding: 14px; }

      .stats { gap: 8px; }
      .stat-box { padding: 10px 12px; }
      .stat-box .value { font-size: 24px; }

      .controls { flex-direction: column; }
      select { width: 100%; }

      .word-row.header { display: none; }

      .word-row {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto;
        gap: 4px 8px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .word-row:first-child { border-radius: 8px; }
      .word-row:last-child { border-radius: 8px; }

      .col-id { grid-column: 1; grid-row: 1; font-size: 10px; }
      .col-day { grid-column: 2; grid-row: 1; font-size: 10px; text-align: right; }
      .col-word { grid-column: 1 / -1; grid-row: 2; font-size: 14px; }
      .col-en { grid-column: 1; grid-row: 3; font-size: 13px; }
      .col-bn { grid-column: 2; grid-row: 3; font-size: 13px; font-family: 'Noto Serif Bengali', serif; }
    }

    @media (max-width: 380px) {
      .stats { flex-direction: column; }
      .word-row {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        gap: 2px;
      }
      .col-id { grid-column: 1; grid-row: 1; }
      .col-day { grid-column: 1; grid-row: 2; text-align: left; }
      .col-word { grid-column: 1; grid-row: 3; }
      .col-en { grid-column: 1; grid-row: 4; }
      .col-bn { grid-column: 1; grid-row: 5; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <strong>Urdu Dictionary</strong>
    <span>উর্দু শব্দভান্ডার</span>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">
    <svg id="t-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <span id="t-label">Light</span>
  </button>
</nav>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-box">
      <div class="label">শব্দ দেখাচ্ছে</div>
      <div class="value" id="stat-count">—</div>
      <div class="sub" id="stat-desc">লোড হচ্ছে…</div>
    </div>
    <div class="stat-box">
      <div class="label">মোট দিন</div>
      <div class="value" id="info-days">—</div>
    </div>
    <div class="stat-box">
      <div class="label">মোট শব্দ</div>
      <div class="value" id="info-words">—</div>
    </div>
  </div>

  <!-- Day filter buttons -->
  <div class="day-selector" id="day-tabs">লোড হচ্ছে…</div>

  <!-- Search & sort -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="Word বা বাংলায় খুঁজুন…" autocomplete="off" />
    </div>
    <select id="sort-sel">
      <option value="">Default</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>

  <!-- Result count -->
  <div class="result-count" id="meta"></div>

  <!-- Word list -->
  <div class="word-list" id="word-list">
    <div class="empty-state">লোড হচ্ছে…</div>
  </div>

</div>

<footer>Urdu Dictionary — উর্দু শব্দভান্ডার</footer>

<script>
/* ── THEME ── */
const root = document.documentElement;
(function(){
  const saved = localStorage.getItem('urdu-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(saved);
})();
function applyTheme(t) {
  root.setAttribute('data-theme', t);
  localStorage.setItem('urdu-theme', t);
  document.getElementById('t-label').textContent = t === 'dark' ? 'Dark' : 'Light';
  document.getElementById('t-icon').innerHTML = t === 'dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}
function toggleTheme() {
  applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

/* ── STATE ── */
let ALL_WORDS = [];
let activeDay = null;

const searchEl  = document.getElementById('search');
const sortSel   = document.getElementById('sort-sel');
const wordList  = document.getElementById('word-list');
const metaEl    = document.getElementById('meta');
const statCount = document.getElementById('stat-count');
const statDesc  = document.getElementById('stat-desc');
const infoDays  = document.getElementById('info-days');
const infoWords = document.getElementById('info-words');
const dayTabsEl = document.getElementById('day-tabs');

/* ── LOAD DATA ── */
async function loadData() {
  try {
    const response = await fetch('urdu_words.html');
    const html = await response.text();
    
    const match = html.match(/<script>([\s\S]*?)<\/script>/);
    if (!match) throw new Error('No script tag found');
    
    const scriptContent = match[1];
    const fn = new Function(scriptContent + '; return ALL_DAYS_DATA;');
    const allDaysData = fn();

    allDaysData.forEach(dayData => {
      dayData.words.forEach(w => {
        ALL_WORDS.push({ ...w, day: dayData.day });
      });
    });

    const days = [...new Set(ALL_WORDS.map(w => w.day))].sort((a,b) => a-b);
    infoDays.textContent  = days.length;
    infoWords.textContent = ALL_WORDS.length;

    buildDayTabs(days);
    render();
  } catch (err) {
    wordList.innerHTML = '<div class="empty-state">ডাটা লোড করতে সমস্যা হয়েছে।<br><small>' + err.message + '</small></div>';
    console.error('Load error:', err);
  }
}

function buildDayTabs(days) {
  dayTabsEl.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'day-btn active';
  allBtn.innerHTML = `All<span class="count">${ALL_WORDS.length}</span>`;
  allBtn.onclick = () => {
    activeDay = null;
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    render();
  };
  dayTabsEl.appendChild(allBtn);

  days.forEach(d => {
    const count = ALL_WORDS.filter(w => w.day === d).length;
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.innerHTML = `Day ${d}<span class="count">${count}</span>`;
    btn.onclick = () => {
      activeDay = d;
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    dayTabsEl.appendChild(btn);
  });
}

function hl(str, q) {
  if (!q) return str;
  return str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  const s = sortSel.value;

  let pool = activeDay ? ALL_WORDS.filter(w => w.day === activeDay) : ALL_WORDS;

  let list = pool.filter(w =>
    !q || w.word.toLowerCase().includes(q) || w.en.toLowerCase().includes(q) || w.bn.includes(q)
  );

  if (s === 'az') list.sort((a,b) => a.word.localeCompare(b.word));
  else if (s === 'za') list.sort((a,b) => b.word.localeCompare(a.word));

  statCount.textContent = list.length;
  if (activeDay) {
    statDesc.textContent = q ? `Day ${activeDay} · সার্চ ফলাফল` : `Day ${activeDay} দেখানো হচ্ছে`;
  } else {
    statDesc.textContent = q ? 'সকল দিন · সার্চ ফলাফল' : 'সকল দিন দেখানো হচ্ছে';
  }

  metaEl.textContent = list.length === pool.length
    ? `${list.length} টি শব্দ`
    : `${list.length} / ${pool.length} টি শব্দ`;

  if (!list.length) {
    wordList.innerHTML = '<div class="empty-state">কোনো শব্দ পাওয়া যায়নি।</div>';
    return;
  }

  wordList.innerHTML = `
    <div class="word-row header">
      <div>#</div>
      <div>Word</div>
      <div>English</div>
      <div>বাংলা</div>
      <div>Day</div>
    </div>
    ${list.map(w => `
      <div class="word-row">
        <div class="col-id">${w.id}</div>
        <div class="col-word">${hl(w.word, q)}</div>
        <div class="col-en">${hl(w.en, q)}</div>
        <div class="col-bn">${hl(w.bn, q)}</div>
        <div class="col-day">${w.day}</div>
      </div>`).join('')}
  `;
}

searchEl.addEventListener('input', render);
sortSel.addEventListener('change', render);

loadData();
</script>
</body>
</html>
